<body>
    <script>
        function processConfirm() {
            let answer = confirm("Do you want to play a game?");
            let result;

            if (answer === true) {
                result = "Excellent. We'll play a nice game of chess.";
            } else {
                result = "Maybe later then.";
            }

            return result;
        }

        let ketQuaTroChuyen = processConfirm();
        alert(ketQuaTroChuyen);
        console.log(ketQuaTroChuyen);

    </script>
</body>
