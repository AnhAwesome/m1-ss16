<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        function tinhTong(arr) {
            let tong = 0;
            for (let i = 0; i < arr.length; i++) {
                tong = tong + arr[i];
            }
            return tong;
        }

        const arr1 =[1, 2, 3, 4, 5, 6];
        const arr2 =[10, 20, 30, 40, 50];
        const arr3 =[1, 3, 5, 7, 9];

        console.log("Tổng của arr1 là:", tinhTong(arr1));
        console.log("Tổng của arr2 là:", tinhTong(arr2));
        console.log("Tổng của arr3 là:", tinhTong(arr3));

    </script>
</body>

</html>
