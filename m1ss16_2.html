<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>
    <script>
        function findMin(arr) {
            if (arr.length === 0) {
                return "Mảng rỗng";
            }

            let min = arr[0];
            for (let i = 1; i < arr.length; i++) {
                if (arr[i] < min) {
                    min = arr[i];
                }
            }
            return min;
        }

        const arr1 = [3, 5, 1, 8, -3, 7, 8];
        const arr2 = [7, 12, 6, 9, 20, 56, 89];
        const arr3 = [];
        const arr4 = [[0, 0, 0, 0, 0, 0]];

        console.log("Giá trị nhỏ nhất của arr1 là:", findMin(arr1));
        console.log("Giá trị nhỏ nhất của arr2 là:", findMin(arr2));
        console.log("Giá trị nhỏ nhất của arr3 là:", findMin(arr3));
        console.log("Giá trị nhỏ nhất của arr4 là:", findMin(arr4));

    </script>
</body>

</html>
